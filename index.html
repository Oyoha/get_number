<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Получить номер телефона</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f7fa;
        flex-direction: column;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 40px 30px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        color: #1e293b;
        margin-top: 0;
        margin-bottom: 8px;
      }
      .sub {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 24px;
      }
      button {
        width: 100%;
        padding: 16px 24px;
        font-size: 18px;
        font-weight: 600;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
      }
      button:hover {
        background: #1d4ed8;
      }
      button:active {
        transform: scale(0.97);
      }
      #os-info {
        margin: 12px 0 8px;
        font-size: 14px;
        color: #475569;
      }
      #result {
        margin-top: 24px;
        padding: 16px;
        border-radius: 12px;
        background: #f1f5f9;
        min-height: 60px;
        font-size: 15px;
        word-break: break-word;
        color: #0f172a;
      }
      .number-item {
        background: white;
        padding: 8px 12px;
        margin: 6px 0;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        font-family: "Courier New", monospace;
        font-size: 16px;
      }
      .error {
        color: #dc2626;
      }
      .success {
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>📱 Получение номера</h1>
      <div class="sub">Выберите номер из предложенных Google или контактов</div>
      <div id="os-info">Определение ОС...</div>
      <button id="getPhoneBtn">Получить номер</button>
      <div id="result">
        <span style="color: #94a3b8">Нажмите кнопку, чтобы начать</span>
      </div>
    </div>

    <script src="https://unpkg.com/webtonative@1.1.6/webtonative.min.js"></script>
    <script>
      (function () {
        "use strict";

        const resultDiv = document.getElementById("result");
        const osInfo = document.getElementById("os-info");
        const btn = document.getElementById("getPhoneBtn");

        function getOSType() {
          const ua = navigator.userAgent || navigator.vendor || window.opera;
          if (/android/i.test(ua)) return "Android";
          if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "iOS";
          return "Desktop";
        }

        const os = getOSType();
        osInfo.textContent = `Операционная система: ${os}`;

        function getContactsPicker() {
          if (!("contacts" in navigator)) {
            resultDiv.innerHTML = `
              <div class="error">❌ Ваш браузер не поддерживает Contact Picker.</div>
              <div style="font-size:13px; color:#64748b; margin-top:8px;">
                Попробуйте Chrome на Android или Safari на iOS.
              </div>
            `;
            return Promise.reject(new Error("Contact Picker not supported"));
          }

          resultDiv.innerHTML = "⏳ Открывается список контактов...";

          return navigator.contacts
            .select(["tel"], { multiple: true })
            .then((contacts) => {
              if (!contacts || contacts.length === 0) {
                resultDiv.innerHTML = "ℹ️ Вы не выбрали ни одного контакта.";
                return Promise.reject(new Error("No contacts selected"));
              }

              let allNumbers = [];
              for (const contact of contacts) {
                if (contact.tel && contact.tel.length > 0) {
                  allNumbers = allNumbers.concat(contact.tel);
                }
              }

              if (allNumbers.length === 0) {
                resultDiv.innerHTML =
                  "ℹ️ В выбранных контактах нет телефонных номеров.";
                return Promise.reject(new Error("No phone numbers found"));
              }

              let html = `<div class="success">✅ Получено номеров (из контактов): ${allNumbers.length}</div>`;
              html += allNumbers
                .map((num) => `<div class="number-item">📞 ${num}</div>`)
                .join("");
              resultDiv.innerHTML = html;
              return allNumbers;
            })
            .catch((error) => {
              console.error("Contact Picker error:", error);
              let msg = error.message || "Неизвестная ошибка";
              if (
                error.name === "AbortError" ||
                error.name === "NotAllowedError"
              ) {
                msg = "Доступ к контактам запрещён или диалог закрыт.";
              }
              resultDiv.innerHTML = `<div class="error">❌ Ошибка Contact Picker: ${msg}</div>`;
              return Promise.reject(error);
            });
        }

        function getPhoneNumber() {
          if (os === "Desktop") {
            resultDiv.innerHTML = `
              <div class="error">❌ Получение номера доступно только на мобильных устройствах.</div>
              <div style="font-size:13px; color:#64748b; margin-top:8px;">
                Откройте страницу на Android или iOS.
              </div>
            `;
            return;
          }

          if (os === "iOS") {
            getContactsPicker();
            return;
          }

          if (
            typeof window.WTN === "undefined" ||
            !window.WTN.getDevicePhoneNumber
          ) {
            resultDiv.innerHTML =
              "⚠️ WebToNative не загружен. Пробуем Contact Picker...";
            getContactsPicker();
            return;
          }

          let wtnFinished = false;
          let timeoutId = null;

          resultDiv.innerHTML = "⏳ Пробуем получить номер через Google...";

          const wtnPromise = new Promise((resolve, reject) => {
            try {
              window.WTN.getDevicePhoneNumber({
                callback: function (response) {
                  if (wtnFinished) return;
                  wtnFinished = true;
                  clearTimeout(timeoutId);

                  if (response.success && response.phoneNumber) {
                    resultDiv.innerHTML = `
                      <div class="success">✅ Номер получен (через Google):</div>
                      <div class="number-item">📞 ${response.phoneNumber}</div>
                    `;
                    resolve(response.phoneNumber);
                  } else {
                    let errorMsg = response.error || "Неизвестная ошибка";
                    if (response.error_code === "USER_CANCELED") {
                      errorMsg = "Вы отменили выбор номера Google.";
                    }
                    resultDiv.innerHTML = `
                      <div class="error">❌ Ошибка Google: ${errorMsg}</div>
                      <div style="font-size:13px; color:#64748b; margin-top:8px;">
                        Переключаемся на выбор из контактов...
                      </div>
                    `;
                    getContactsPicker().catch(() => {});
                    reject(new Error(errorMsg));
                  }
                },
              });
            } catch (e) {
              if (wtnFinished) return;
              wtnFinished = true;
              clearTimeout(timeoutId);
              resultDiv.innerHTML = `
                <div class="error">❌ Ошибка вызова WTN: ${e.message}</div>
                <div style="font-size:13px; color:#64748b; margin-top:8px;">
                  Переключаемся на выбор из контактов...
                </div>
              `;
              getContactsPicker().catch(() => {});
              reject(e);
            }
          });

          timeoutId = setTimeout(() => {
            if (wtnFinished) return;
            wtnFinished = true;
            resultDiv.innerHTML = `
              <div style="color:#f59e0b; font-weight:600;">⏱️ Время ожидания Google истекло (5 сек).</div>
              <div style="font-size:13px; color:#64748b; margin-top:8px;">
                Переключаемся на выбор из контактов...
              </div>
            `;
            getContactsPicker().catch(() => {});
          }, 5000);

          wtnPromise.catch(() => {});
        }

        btn.addEventListener("click", getPhoneNumber);

        if (os === "Desktop") {
          resultDiv.innerHTML = `
            <div style="color:#94a3b8; font-size:14px;">
              Получение номера доступно только на Android и iOS.<br>
              Откройте страницу на смартфоне.
            </div>
          `;
        }
      })();
    </script>
  </body>
</html>
