<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Получить номер телефона</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f7fa;
        flex-direction: column;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 40px 30px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        text-align: center;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        color: #1e293b;
        margin-top: 0;
        margin-bottom: 8px;
      }
      .sub {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 24px;
      }
      button {
        width: 100%;
        padding: 16px 24px;
        font-size: 18px;
        font-weight: 600;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
      }
      button:hover {
        background: #1d4ed8;
      }
      button:active {
        transform: scale(0.97);
      }
      #os-info {
        margin: 12px 0 8px;
        font-size: 14px;
        color: #475569;
      }
      #result {
        margin-top: 24px;
        padding: 16px;
        border-radius: 12px;
        background: #f1f5f9;
        min-height: 60px;
        font-size: 15px;
        word-break: break-word;
        color: #0f172a;
      }
      .number-item {
        background: white;
        padding: 8px 12px;
        margin: 6px 0;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        font-family: "Courier New", monospace;
        font-size: 16px;
      }
      .error {
        color: #dc2626;
      }
      .success {
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>📱 Получение номера</h1>
      <div class="sub">Выберите номер из предложенных Google</div>

      <div id="os-info">Определение ОС...</div>
      <button id="getPhoneBtn">Получить номер</button>

      <div id="result">
        <span style="color: #94a3b8">Нажмите кнопку, чтобы начать</span>
      </div>
    </div>

    <script src="https://unpkg.com/webtonative@1.1.6/webtonative.min.js"></script>

    <script>
      (function () {
        "use strict";

        const resultDiv = document.getElementById("result");
        const osInfo = document.getElementById("os-info");
        const btn = document.getElementById("getPhoneBtn");

        function getOSType() {
          const ua = navigator.userAgent || navigator.vendor || window.opera;
          if (/android/i.test(ua)) return "Android";
          if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return "iOS";
          return "Desktop";
        }

        const os = getOSType();
        osInfo.textContent = `Операционная система: ${os}`;

        function getPhoneNumber() {
          if (
            typeof window.WTN === "undefined" ||
            !window.WTN.getDevicePhoneNumber
          ) {
            resultDiv.innerHTML = `
              <div class="error">❌ WebToNative SDK не загружен.</div>
              <div style="font-size:13px; color:#64748b; margin-top:8px;">
                Убедитесь, что вы подключили SDK и открываете страницу в приложении WebToNative.
              </div>
            `;
            return;
          }

          if (os !== "Android") {
            resultDiv.innerHTML = `
              <div class="error">❌ Этот метод доступен только на Android.</div>
              <div style="font-size:13px; color:#64748b; margin-top:8px;">
                Откройте страницу на устройстве Android.
              </div>
            `;
            return;
          }

          resultDiv.innerHTML = "⏳ Открывается выбор номера Google...";

          window.WTN.getDevicePhoneNumber({
            callback: function (response) {
              if (response.success && response.phoneNumber) {
                resultDiv.innerHTML = `
                  <div class="success">✅ Номер получен:</div>
                  <div class="number-item">📞 ${response.phoneNumber}</div>
                `;
              } else {
                let errorMsg = response.error || "Неизвестная ошибка";
                if (response.error_code === "USER_CANCELED") {
                  errorMsg = "Вы отменили выбор номера.";
                }
                resultDiv.innerHTML = `
                  <div class="error">❌ Ошибка: ${errorMsg}</div>
                  <div style="font-size:13px; color:#64748b; margin-top:8px;">
                    Попробуйте снова или убедитесь, что у вас есть номер в Google-аккаунте.
                  </div>
                `;
              }
            },
          });
        }

        btn.addEventListener("click", getPhoneNumber);

        if (os !== "Android") {
          resultDiv.innerHTML = `
            <div style="color:#94a3b8; font-size:14px;">
              Получение номера через WebToNative доступно только на Android.<br>
              Откройте страницу на Android-устройстве.
            </div>
          `;
        }
      })();
    </script>
  </body>
</html>
